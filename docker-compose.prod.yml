services:
  api:
    image: ghcr.io/${GITHUB_REPOSITORY}/api:latest
    container_name: ngocky-api
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ngocky
      - caddy-network

  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/web:latest
    container_name: ngocky-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - ngocky
      - caddy-network

  postgres:
    image: postgres:16-alpine
    container_name: ngocky-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ngocky
      POSTGRES_USER: ngocky
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ngocky" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ngocky

volumes:
  pgdata:

networks:
  ngocky:
    driver: bridge
  caddy-network:
    external: true
    name: n8n-docker-caddy_n8n-network
