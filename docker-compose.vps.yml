services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ngocky-api
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ngocky

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: ngocky-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"  # We'll use 8080 temporarily to avoid conflict with your existing Caddy
    networks:
      - ngocky
      - caddy-network

  postgres:
    image: postgres:16-alpine
    container_name: ngocky-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ngocky
      POSTGRES_USER: ngocky
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ngocky_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ngocky" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ngocky

volumes:
  pgdata:

networks:
  ngocky:
    driver: bridge
  caddy-network:
    external: true
    name: n8n-docker-caddy_n8n-network
